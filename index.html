<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADECON 2026 – Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0b1847;
  --orange: #e8621a;
  --orange-lt: #f7813e;
  --white: #ffffff;
  --border: rgba(0,0,0,0.08);
}

/* PAGE */
body {
  font-family: 'DM Sans', sans-serif;
  background: #ffffff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER IMAGE */
.header-img-wrap {
  padding-top: 10px;
}
.full-width {
  width: 100%;
  max-height: 200px;
  object-fit: contain;
}

/* MAIN WRAPPER */
.cards-wrapper {
  flex: 1;
  padding: 48px 24px 64px;
  text-align: center;
}

/* TOP SECTION */
.top-section {
  margin-bottom: 42px;
}

/* HEADER TEXT */
.header-text h1 {
  font-size: 44px;
  font-weight: 800;
  color: var(--navy);
  margin-bottom: 10px;
}

.eyebrow {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 14px;
  display: inline-block;
}

.meta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
}

.dot {
  width: 4px; height: 4px;
  background: var(--orange);
  border-radius: 50%;
}

/* LOGIN ROW */
.login-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
  margin-top: 20px;
}

.login-text {
  color: #4b5563;
  font-size: 14px;
}

.login-btn {
  padding: 10px 26px;
  background: var(--orange);
  color: white;
  border-radius: 999px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  transition: 0.2s;
}

.login-btn:hover {
  background: var(--orange-lt);
}

/* DIVIDER */
.divider {
  margin: 50px auto 10px;
  display: flex;
  align-items: center;
  gap: 16px;
  max-width: 520px;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-title {
  font-size: 22px;
  font-weight: 700;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-top: 36px;
  flex-wrap: wrap;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 36px 30px;
  width: 240px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
}

.card-tag {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--orange);
  margin-bottom: 10px;
}

.card h3 {
  font-size: 20px;
  margin-bottom: 10px;
  color: var(--navy);
}

.price {
  font-size: 34px;
  font-weight: 700;
  margin: 10px 0;
}

.price-note {
  font-size: 11px;
  color: #6b7280;
  margin-bottom: 20px;
}

.card a {
  padding: 10px 24px;
  background: var(--orange);
  color: white;
  border-radius: 999px;
  text-decoration: none;
  font-size: 14px;
}

.card a:hover {
  background: var(--orange-lt);
}

/* FOOTER */
.footer {
  width: 100%;
  max-height: 140px;
  object-fit: contain;
  margin-top: 30px;
}

/* MOBILE */
@media (max-width: 768px) {
  .header-text h1 { font-size: 30px; }
  .cards { flex-direction: column; align-items: center; }
  .card { width: 90%; max-width: 320px; }
}
</style>
</head>

<body>

<!-- HEADER IMAGE -->
<div class="header-img-wrap">
  <img class="full-width"
       src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/ADECON_Registration_Banner_Header-removebg-preview.png">
</div>

<!-- MAIN -->
<div class="cards-wrapper">

  <!-- TOP SECTION -->
  <div class="top-section">

    <div class="header-text">
      <span class="eyebrow">11th ADE Annual National Conference</span>
      <h1>ADECON 2026</h1>
      <div class="meta">
        <span>28–29 March 2026</span>
        <span class="dot"></span>
        <span>Virtual</span>
      </div>
    </div>

    <div class="login-row">
      <span class="login-text">Already registered?</span>
      <a href="https://adecon.onrender.com/" target="_blank" class="login-btn">
        Login
      </a>
    </div>

  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <span class="section-title">Register Now</span>
  </div>

  <!-- CARDS -->
  <div class="cards">

    <div class="card">
      <div class="card-tag">Member Rate</div>
      <h3>ADE Members</h3>
      <div class="price">₹625</div>
      <div class="price-note">per delegate</div>
      <a href="https://www.onference.in/c/adecon-2026-member/6794" target="_blank">Register</a>
    </div>

    <div class="card">
      <div class="card-tag">Non-Member Rate</div>
      <h3>Non-member</h3>
      <div class="price">₹990</div>
      <div class="price-note">per delegate</div>
      <a href="https://www.onference.in/c/adecon-2026-non-member/6795" target="_blank">Register</a>
    </div>

  </div>

</div>

<!-- FOOTER -->
<div>
  <img class="footer"
       src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/ADECON_Registration_Banner_Footer-removebg-preview.png">
</div>

</body>
</html>
